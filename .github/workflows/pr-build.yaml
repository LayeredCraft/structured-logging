name: PR Build

on:
  pull_request:
    branches:
      - main
permissions:
  contents: read
jobs:
  build:
    uses: LayeredCraft/devops-templates/.github/workflows/pr-build.yaml@v10.0
    with:
      solution: LayeredCraft.StructuredLogging.slnx
      hasTests: true
      dotnetVersion: |
        8.0.x
        9.0.x
        10.0.x
        11.0.x
      runCdk: false
    secrets: inherit